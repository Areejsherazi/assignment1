name: Deploy to EC2

on:
  push:
    branches: [ test ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test Network Connectivity
      run: |
        echo "Testing network connectivity to ${{ secrets.EC2_HOST }}..."
        timeout 10 nc -zv ${{ secrets.EC2_HOST }} 22 || echo "SSH port 22 is not reachable"
        ping -c 3 ${{ secrets.EC2_HOST }} || echo "Host is not reachable"
        echo "If both fail, check EC2 security group and public IP"

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        timeout: 60s
        command_timeout: 300s
        script: |
          # Detect OS and install packages
          if command -v apt &> /dev/null; then
            # Ubuntu/Debian
            sudo apt update && sudo apt upgrade -y
            sudo apt install -y docker.io docker-compose git
            sudo usermod -aG docker $USER
            sudo systemctl enable docker
            sudo systemctl start docker
          elif command -v yum &> /dev/null; then
            # Amazon Linux/CentOS
            sudo yum update -y
            sudo yum install -y docker git
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo usermod -a -G docker $USER
            # Install docker-compose
            sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          else
            echo "Unsupported OS"
            exit 1
          fi
          
          # Create app directory if it doesn't exist
          mkdir -p /home/${{ secrets.EC2_USERNAME }}/app
          cd /home/${{ secrets.EC2_USERNAME }}/app
          
          # Clone or update repository (using GitHub token for private repo)
          if [ ! -d ".git" ]; then
            echo "Cloning repository for first time..."
            git clone https://${{ secrets.GITHUB_TOKEN }}@github.com/Areejsherazi/Media-share.git .
          else
            echo "Repository exists, pulling latest changes..."
            git pull origin test
          fi
          
          # Stop existing containers
          docker-compose down || true
          
          # Build and start with Docker Compose
          docker-compose up -d --build
          
          # Wait for services to be healthy
          sleep 30
          
          # Check if services are running
          docker-compose ps
          
          # Show logs for debugging
          docker-compose logs app
