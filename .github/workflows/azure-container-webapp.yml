name: Deploy to Azure Container Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Show workspace contents
        run: |
          echo "📁 Current workspace contents:"
          ls -la
          echo ""
          echo "🐳 Dockerfile contents:"
          cat Dockerfile
          echo ""
          echo "📦 Package.json contents:"
          cat package.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug - Docker Buildx info
        run: |
          echo "🔧 Docker Buildx info:"
          docker buildx version
          docker buildx ls

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Debug - Verify Docker login
        run: |
          echo "🔐 Docker login verification:"
          docker info | grep Username || true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: moizbukhari/media-share:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Debug - Verify Docker image
        run: |
          echo "🐳 Verifying Docker image:"
          docker pull moizbukhari/media-share:latest
          docker images moizbukhari/media-share

      # ✅ SAFE CHECK (no bash XML parsing issue)
      - name: Debug - Check Azure credentials
        env:
          AZURE_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          echo "🔑 Checking Azure credentials..."

          if [ -z "$AZURE_PUBLISH_PROFILE" ]; then
            echo "❌ AZURE_WEBAPP_PUBLISH_PROFILE is missing"
          else
            echo "✅ AZURE_WEBAPP_PUBLISH_PROFILE is set"
          fi

          if [ -z "$AZURE_RG" ]; then
            echo "❌ AZURE_RESOURCE_GROUP is missing"
          else
            echo "✅ AZURE_RESOURCE_GROUP is set"
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: sharing
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: moizbukhari/media-share:latest

      - name: Debug - Verify deployment
        run: |
          echo "🚀 Checking deployment status..."
          echo "Web App: sharing"
          echo "Resource Group: ${{ secrets.AZURE_RESOURCE_GROUP }}"

      - name: Configure App Settings
        run: |
          echo "⚙️ Configuring app settings..."

          echo "🔍 Checking environment secrets:"
          echo "MONGODB_URI: ${{ secrets.MONGODB_URI != '' && 'SET' || 'MISSING' }}"
          echo "JWT_SECRET: ${{ secrets.JWT_SECRET != '' && 'SET' || 'MISSING' }}"
          echo "CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME != '' && 'SET' || 'MISSING' }}"
          echo "CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY != '' && 'SET' || 'MISSING' }}"
          echo "CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET != '' && 'SET' || 'MISSING' }}"
          echo "REDIS_HOST: ${{ secrets.REDIS_HOST != '' && 'SET' || 'MISSING' }}"

          az webapp config appsettings set \
            --name sharing \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
            MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            JWT_EXPIRES_IN="${{ secrets.JWT_EXPIRES_IN || '7d' }}" \
            CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
            CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
            CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
            CLOUDINARY_FOLDER="${{ secrets.CLOUDINARY_FOLDER || 'photo-sharing' }}" \
            REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            REDIS_PORT="${{ secrets.REDIS_PORT || '6379' }}" \
            REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            PORT=3000 \
            NODE_ENV=production

      - name: Debug - Verify app settings
        run: |
          echo "🔍 Verifying app settings..."
          az webapp config appsettings list \
            --name sharing \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --output table

      - name: Restart Web App
        run: |
          echo "🔄 Restarting web app..."
          az webapp restart \
            --name sharing \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

      - name: Debug - Check web app status
        run: |
          echo "📊 Checking web app status..."
          az webapp show \
            --name sharing \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "{state: state, hostName: defaultHostName, enabled: enabled}" \
            --output table